# ============================================================
# Скоринг приоритета сигнала: 0..100.
# score = w_budget*f(бюджет) + w_fresh*f(свежесть) + w_region*f(регион)
#       + w_category*f(категория) + бонус за наличие прямого контакта.
# Все веса и справочники — здесь; код формулы не трогаем.
# ЧЕРНОВИК (A-5): владелец подкрутит после демо Этапа 2/3.
# ============================================================

weights:
  budget: 35
  freshness: 25
  region: 20
  category: 20

# Бюджет (KZT) -> фактор 0..1 (порог, фактор); берётся первый порог >= бюджета
budget_buckets:
  - [500000, 0.15]        # < 500 тыс — мелочь
  - [2000000, 0.4]
  - [5000000, 0.6]
  - [15000000, 0.8]
  - [50000000, 0.95]
  - [999999999999, 1.0]   # 50 млн+ — максимум
budget_unknown_factor: 0.3   # бюджет не указан

# Свежесть: фактор = 0.5 ** (возраст_в_днях / half_life)
freshness_half_life_days: 7
freshness_unknown_factor: 0.5

# Приоритетные регионы (ЧЕРНОВИК — уточнит владелец)
home_regions:
  - "г. Астана"
  - "г. Алматы"
  - "Карагандинская область"
  - "г. Шымкент"
region_factors:
  home: 1.0
  other: 0.6
  unknown: 0.4

# Вес товарной группы (маржинальность/интересность — ЧЕРНОВИК)
category_factors:
  beds: 1.0
  mattresses: 1.0
  bedding: 0.75
  furniture_ldsp: 0.9
  kitchen: 0.8
  office_chairs: 0.85
  racks: 1.0
  retail_equipment: 0.9
  showcases: 1.0
  mdf: 0.7
  turnkey: 1.0
  other: 0.4

# Бонус, если у сигнала уже есть прямой контакт (телефон/почта)
contact_bonus: 5
