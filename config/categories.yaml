  retail_food:
    title: "Продуктовый ретейл (стеллажи, ценникодержатели, крючки)"
    codes: ["47.11", "47.19"]
  pharmacies:
    title: "Аптеки (аптека под ключ, витрины)"
    codes: ["47.73"]
  jewelry:
    title: "Ювелирные магазины (витрины, салон под ключ)"
    codes: ["47.77"]
  warehousing:
    title: "Склады и логистика (стеллажи)"
    codes: ["52.10", "52.29"]
  construction_dev:
    title: "Девелоперы/застройщики (оснащение объектов, опережающий)"
    codes: ["41.10", "41.20", "68.10", "68.20"]
  furniture_retail:
    title: "Мебельные магазины (опт/розница — партнёры или клиенты)"
    codes: ["47.59", "46.47", "46.15"]
  museums:
    title: "Музеи (музейные витрины)"
    codes: ["91.02"]
  offices_bpo:
    title: "Крупные офисы/колл-центры (кресла, офисная мебель)"
    codes: ["82.20", "70.10"]
