# ============================================================
# Товарные группы: ключевые слова, черновые коды ЕНС ТРУ и ОКЭД.
#
# ВНИМАНИЕ: коды ТРУ/ОКЭД — ЧЕРНОВИК (Этап 0), собраны по структуре
# классификаторов ЕНС ТРУ (первые 6 цифр = КПВЭД-группа) и ОКЭД РК.
# До подтверждения владельцем фильтрация идёт ПО КЛЮЧЕВЫМ СЛОВАМ,
# коды — вторичный (усиливающий) признак. tru_prefixes сопоставляются
# как префиксы кода лота (например "310912" покроет 310912.500.000015).
# ============================================================

# Ключевые слова — СТЕМЫ, матчинг по началу слова (regex \b<стем>), регистр
# игнорируется: "кроват" ловит «кровать/кровати/кроватей/кроватями».
categories:
  beds:
    title: "Кровати (металл / ЛДСП)"
    keywords: [кроват, койк, койко-мест, двухъярусн]
    tru_prefixes: ["310911", "310912"]            # мебель металлическая / деревянная (кровати)
    negative_keywords: [автокресл]                # защита от ложных срабатываний

  mattresses:
    title: "Матрасы (в т.ч. люкс)"
    keywords: [матрас, матрац, наматрасник]
    tru_prefixes: ["310312", "310313"]            # матрасы пружинные / беспружинные

  bedding:
    title: "Постельное бельё"
    keywords: [постельн, простын, наволочк, пододеяльник, одеял, подушк, покрывал]
    tru_prefixes: ["139212"]                      # бельё постельное

  furniture_ldsp:
    title: "ЛДСП-мебель (шкафы, столы, тумбы)"
    keywords: [мебел, шкаф, тумб, гардероб, лдсп, стол письменн, стол офисн, стол учениче, парт]
    tru_prefixes: ["310100", "310912", "310913", "310914"]
    negative_keywords: [шкаф управлени, шкаф электрическ, шкаф серверн, шкаф автоматик,
                        шкаф распределительн, партий, партнер]   # электрошкафы и не-парты

  kitchen:
    title: "Кухонные гарнитуры"
    keywords: [кухонн, кухн]
    tru_prefixes: ["310210"]                      # мебель кухонная

  office_chairs:
    title: "Офисные кресла и стулья"
    keywords: [кресл, стул]
    tru_prefixes: ["310011", "310012"]            # сиденья/стулья
    negative_keywords: [кресло-коляск, коляск, стоматологич, парикмахерск, автокресл, кресло автомобильн]

  racks:
    title: "Складские стеллажи"
    keywords: [стеллаж, паллетн]
    tru_prefixes: ["251110", "310911"]            # металлоконструкции / мебель метал.

  retail_equipment:
    title: "Ценникодержатели, крючки, торговое оборудование"
    keywords: [ценникодержател, ценник, экономпанел, торговое оборудован, торгового оборудован]
    tru_prefixes: ["222925", "259399"]            # изделия пластиковые / металлические прочие

  showcases:
    title: "Витрины (торговые / музейные / ювелирные)"
    keywords: [витрин, прилавк, прилавок]
    tru_prefixes: ["310111"]                      # мебель для предприятий торговли
    negative_keywords: [витрина холодильн, витрины холодильн, холодильн]  # холодильные — не наше (пока)

  mdf:
    title: "МДФ-панели"
    keywords: [мдф, стеновые панел, стеновых панел, панели стенов]
    tru_prefixes: ["162114", "162113"]            # плиты древесноволокнистые / облицованные

  turnkey:
    title: "Аптеки и ювелирные салоны под ключ"
    keywords: [аптек, ювелирн]
    tru_prefixes: []                              # ловится словами + витринами
    negative_keywords: [аптечк]                   # «аптечка первой помощи» — не наше

# Общие стемы из брифа (широкая сеть: категория не определена -> other)
global_keywords: [кроват, матрас, постельн, бель, мебел, кресл, стеллаж,
                  витрин, мдф, лдсп, кухонн, шкаф, ценникодержател]

