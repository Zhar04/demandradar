# ============================================================
# Товарные группы: ключевые слова, черновые коды ЕНС ТРУ и ОКЭД.
#
# ВНИМАНИЕ: коды ТРУ/ОКЭД — ЧЕРНОВИК (Этап 0), собраны по структуре
# классификаторов ЕНС ТРУ (первые 6 цифр = КПВЭД-группа) и ОКЭД РК.
# До подтверждения владельцем фильтрация идёт ПО КЛЮЧЕВЫМ СЛОВАМ,
# коды — вторичный (усиливающий) признак. tru_prefixes сопоставляются
# как префиксы кода лота (например "310912" покроет 310912.500.000015).
# ============================================================

categories:
  beds:
    title: "Кровати (металл / ЛДСП)"
    keywords: [кровать, кровати, койк]           # "койко-место", "койки"
    tru_prefixes: ["310911", "310912"]            # мебель металлическая / деревянная (кровати)
    negative_keywords: [автокресл]                # защита от ложных срабатываний

  mattresses:
    title: "Матрасы (в т.ч. люкс)"
    keywords: [матрас, матрац, наматрасник]
    tru_prefixes: ["310312", "310313"]            # матрасы пружинные / беспружинные

  bedding:
    title: "Постельное бельё"
    keywords: [постельн, бельё постельное, белье постельное, простын, наволочк, пододеяльник, одеял, подушк]
    tru_prefixes: ["139212"]                      # бельё постельное

  furniture_ldsp:
    title: "ЛДСП-мебель (шкафы, столы, тумбы)"
    keywords: [мебель, шкаф, тумб, стол письменный, стол офисный, гардероб, ЛДСП]
    tru_prefixes: ["310100", "310912", "310913", "310914"]
    negative_keywords: [шкаф управлени, шкаф электрическ, шкаф серверн, шкаф автоматик]  # электрошкафы — не наше

  kitchen:
    title: "Кухонные гарнитуры"
    keywords: [кухонн, гарнитур кухон, кухня в сборе]
    tru_prefixes: ["310210"]                      # мебель кухонная

  office_chairs:
    title: "Офисные кресла"
    keywords: [кресло офисн, кресло руководител, кресло оператор, стул офисн, стуль]
    tru_prefixes: ["310011", "310012", "310100"]  # сиденья и части, мебель офисная
    negative_keywords: [кресло-коляск, кресло стоматолог, кресло парикмахер, автокресл]

  racks:
    title: "Складские стеллажи"
    keywords: [стеллаж, паллетн, полочны]
    tru_prefixes: ["251110", "310100", "310911"]  # металлоконструкции / мебель метал.

  retail_equipment:
    title: "Ценникодержатели, крючки, торговое оборудование"
    keywords: [ценникодержател, ценник, крючок торгов, крючки торгов, торговое оборудование, экономпанел]
    tru_prefixes: ["222925", "259399"]            # изделия пластиковые / металлические прочие

  showcases:
    title: "Витрины (торговые / музейные / ювелирные)"
    keywords: [витрин, прилавок, прилавк]
    tru_prefixes: ["310111", "310911"]            # мебель для предприятий торговли
    negative_keywords: [витрина холодильн]        # холодильные витрины — не наше (пока)

  mdf:
    title: "МДФ-панели"
    keywords: [МДФ, панел МДФ, панели стенов]
    tru_prefixes: ["162114", "162113"]            # плиты древесноволокнистые / облицованные

  turnkey:
    title: "Аптеки и ювелирные салоны под ключ"
    keywords: [аптек под ключ, оснащение аптек, мебель для аптек, ювелирн салон, оснащение магазин]
    tru_prefixes: []                              # ловится словами + витринами

# Общие ключевые слова из брифа (широкая сеть, если категория не определена -> other)
global_keywords: [кровать, матрас, постельное, бельё, белье, мебель, кресло, стеллаж,
                  витрина, МДФ, ЛДСП, кухонн, шкаф, стол, ценникодержатель]

# ------------------------------------------------------------
# ОКЭД РК (черновик) — для модуля «новые компании» (опережающий спрос):
# какие свежерегистрированные компании нам интересны.
# ------------------------------------------------------------
